<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Labtoso Client</title>
  <meta name="description" content="Offizielle Labtoso Client Website mit automatischem Download der neuesten Version.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="hero">
      <p class="hero-kicker">LABTOSO CLIENT</p>
      <p class="hero-copy">
      </p>
    </header>

    <section class="download-panel" id="download">
      <p class="panel-label">Latest Release</p>
      <p id="latestVersionLabel" class="latest">Suche neueste Version...</p>

      <button id="downloadButton" type="button" disabled>Download wird vorbereitet...</button>

      <p id="downloadHint" class="hint">
        Der Button nimmt automatisch die hoechste Version in versions.json (z. B. 1.1.21 kleiner als 1.1.22).
      </p>
    </section>

    <p class="footer-note">Labtoso Client - Official Download</p>
  </main>

  <script src="script.js" defer></script>
</body>
</html>
